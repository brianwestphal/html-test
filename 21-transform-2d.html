<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>21 — 2D transforms</title>
<style>
  body { font-family: sans-serif; margin: 2em; background: #f1f5f9; }
  .stage { background: white; padding: 30px; margin: 10px 0; }
  .card {
    display: inline-block;
    width: 90px;
    height: 60px;
    margin: 30px;
    background: #4f46e5;
    color: white;
    text-align: center;
    line-height: 60px;
    font-weight: 600;
  }
  .translate      { transform: translate(40px, 20px); }
  .translate-pct  { transform: translate(50%, -10%); background: #dc2626; }
  .rotate         { transform: rotate(20deg); }
  .rotate-90      { transform: rotate(90deg); }
  .scale          { transform: scale(1.3, 0.8); }
  .scale-uni      { transform: scale(1.5); background: #16a34a; }
  .skew           { transform: skew(20deg, 5deg); }
  .skew-x         { transform: skewX(30deg); }
  .matrix         { transform: matrix(1, 0.2, -0.2, 1, 20, 10); background: #7c3aed; }
  .combined       { transform: translate(30px, 0) rotate(15deg) scale(1.2); background: #ea580c; }

  .origin-0       { transform: rotate(30deg); transform-origin: 0 0; background: #0ea5e9; }
  .origin-br      { transform: rotate(30deg); transform-origin: bottom right; background: #0ea5e9; }

  /* New transform components */
  .new-translate { translate: 30px 0; background: #f43f5e; }
  .new-rotate    { rotate: 20deg; background: #f59e0b; color: black; }
  .new-scale     { scale: 1.4; background: #8b5cf6; }
</style>
</head>
<body>
<h1>2D transforms (static)</h1>

<h2>translate / rotate / scale / skew / matrix</h2>
<div class="stage">
  <span class="card">none</span>
  <span class="card translate">trans(40,20)</span>
  <span class="card translate-pct">trans %</span>
  <span class="card rotate">rot 20°</span>
  <span class="card rotate-90">rot 90°</span>
  <span class="card scale">scale 1.3/.8</span>
  <span class="card scale-uni">scale 1.5</span>
  <span class="card skew">skew 20,5°</span>
  <span class="card skew-x">skewX 30°</span>
  <span class="card matrix">matrix(…)</span>
  <span class="card combined">combined</span>
</div>

<h2>transform-origin</h2>
<div class="stage">
  <span class="card origin-0">origin 0 0</span>
  <span class="card origin-br">origin br</span>
</div>

<h2>Individual transform properties (translate / rotate / scale)</h2>
<div class="stage">
  <span class="card new-translate">translate</span>
  <span class="card new-rotate">rotate</span>
  <span class="card new-scale">scale</span>
</div>
</body>
</html>
