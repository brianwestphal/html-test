<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>17 — linear-gradient</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .g { display: inline-block; width: 220px; height: 120px; margin: 6px; color: white; padding: 8px; font-weight: bold; vertical-align: top; }
  .v   { background: linear-gradient(#4f46e5, #dc2626); }
  .h   { background: linear-gradient(to right, #4f46e5, #dc2626); }
  .d   { background: linear-gradient(45deg, #4f46e5, #dc2626); }
  .d2  { background: linear-gradient(to top right, #4f46e5, #dc2626); }
  .stops { background: linear-gradient(90deg, #0ea5e9 0%, #0ea5e9 33%, #f59e0b 33%, #f59e0b 66%, #16a34a 66%); }
  .hints { background: linear-gradient(to right, #4f46e5, 20%, #dc2626); }
  .multi { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); }
  .alpha { background: linear-gradient(90deg, rgba(255,0,0,1) 0%, rgba(255,0,0,0) 100%), url("assets/img-wide.png") center/cover; }
</style>
</head>
<body>
<h1>linear-gradient</h1>
<div class="g v">vertical default</div>
<div class="g h">to right</div>
<div class="g d">45deg</div>
<div class="g d2">to top right</div>
<div class="g stops">hard color stops (bands)</div>
<div class="g hints">color-hint at 20% (shifts midpoint)</div>
<div class="g multi">7-color rainbow</div>
<div class="g alpha">alpha gradient over image (fade from red)</div>
</body>
</html>
