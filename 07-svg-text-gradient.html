<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>07 — SVG text, gradients, pattern, clip, mask, use</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  svg { border: 1px solid #334155; background: #f8fafc; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>SVG — text, gradients, patterns, clipPath, mask, defs/use</h1>

<svg width="600" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f43f5e"/>
      <stop offset="50%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="rg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3" fill="#6366f1"/>
    </pattern>
    <clipPath id="clip">
      <circle cx="460" cy="90" r="60"/>
    </clipPath>
    <mask id="mask">
      <rect width="100%" height="100%" fill="white"/>
      <text x="540" y="110" text-anchor="middle" font-size="90" fill="black" font-weight="bold">M</text>
    </mask>
    <g id="star">
      <polygon points="0,-20 5,-6 20,-6 8,3 12,18 0,9 -12,18 -8,3 -20,-6 -5,-6" fill="#f59e0b"/>
    </g>
  </defs>

  <rect x="10"  y="10" width="180" height="160" fill="url(#lg)"/>
  <rect x="200" y="10" width="100" height="160" fill="url(#rg)"/>
  <rect x="310" y="10" width="130" height="160" fill="url(#dots)"/>

  <g clip-path="url(#clip)">
    <rect x="400" y="30" width="120" height="120" fill="#0ea5e9"/>
    <rect x="430" y="60" width="60" height="60" fill="#dc2626"/>
  </g>

  <rect x="490" y="10" width="100" height="160" fill="#4f46e5" mask="url(#mask)"/>

  <text x="300" y="120" text-anchor="middle" font-size="48" font-weight="bold" fill="url(#lg)">SVG Text</text>

  <use href="#star" x="40"  y="150"/>
  <use href="#star" x="80"  y="150" transform="scale(1.2)"/>
  <use href="#star" x="120" y="150"/>
</svg>

<h2>transform attribute on elements</h2>
<svg width="600" height="120" xmlns="http://www.w3.org/2000/svg">
  <rect x="40" y="20" width="60" height="60" fill="#e11d48"/>
  <rect x="40" y="20" width="60" height="60" fill="#10b981" transform="translate(100 0)"/>
  <rect x="40" y="20" width="60" height="60" fill="#f59e0b" transform="translate(200 0) rotate(30 70 50)"/>
  <rect x="40" y="20" width="60" height="60" fill="#6366f1" transform="translate(320 0) scale(0.6 1.2)"/>
  <rect x="40" y="20" width="60" height="60" fill="#0ea5e9" transform="translate(400 0) skewX(20)"/>
</svg>
</body>
</html>
