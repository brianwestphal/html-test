<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>04 — colspan, rowspan</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  table { border-collapse: collapse; }
  th, td { border: 1px solid #475569; padding: 8px 14px; text-align: center; }
  th { background: #cbd5e1; }
  .span { background: #fee2e2; }
</style>
</head>
<body>
<h1>Cell spans — colspan &amp; rowspan</h1>
<table>
  <tr>
    <th colspan="3" class="span">colspan=3 header</th>
  </tr>
  <tr>
    <td rowspan="2" class="span">rowspan=2</td>
    <td>A</td>
    <td>B</td>
  </tr>
  <tr>
    <td>C</td>
    <td>D</td>
  </tr>
  <tr>
    <td>E</td>
    <td colspan="2" class="span">colspan=2</td>
  </tr>
  <tr>
    <td>F</td>
    <td rowspan="2" colspan="2" class="span">rowspan=2<br>colspan=2</td>
  </tr>
  <tr>
    <td>G</td>
  </tr>
</table>
</body>
</html>
