<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>22 — filter</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, 160px); gap: 12px; }
  figure { margin: 0; text-align: center; font-size: 12px; color: #475569; }
  figure img { width: 128px; height: 128px; border: 1px solid #334155; }
</style>
</head>
<body>
<h1>filter — image filters (static, no animation)</h1>
<div class="grid">
  <figure><img src="assets/img-wide.png"><figcaption>none</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: blur(4px)"><figcaption>blur(4px)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: brightness(1.6)"><figcaption>brightness(1.6)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: brightness(0.4)"><figcaption>brightness(0.4)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: contrast(1.8)"><figcaption>contrast(1.8)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: contrast(0.5)"><figcaption>contrast(0.5)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: grayscale(1)"><figcaption>grayscale(1)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: sepia(1)"><figcaption>sepia(1)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: hue-rotate(90deg)"><figcaption>hue-rotate(90°)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: hue-rotate(180deg)"><figcaption>hue-rotate(180°)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: invert(1)"><figcaption>invert(1)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: opacity(0.3)"><figcaption>opacity(0.3)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: saturate(2)"><figcaption>saturate(2)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: saturate(0)"><figcaption>saturate(0)</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: drop-shadow(4px 4px 6px rgba(0,0,0,.6))"><figcaption>drop-shadow</figcaption></figure>
  <figure><img src="assets/img-wide.png" style="filter: blur(1px) contrast(1.5) hue-rotate(40deg) brightness(1.1)"><figcaption>chained</figcaption></figure>
</div>
</body>
</html>
