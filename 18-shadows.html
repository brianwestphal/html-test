<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>18 — box-shadow / text-shadow</title>
<style>
  body { font-family: sans-serif; margin: 2em; background: #f1f5f9; }
  .s {
    display: inline-block;
    width: 160px;
    height: 80px;
    margin: 18px;
    padding: 8px;
    background: white;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    line-height: 64px;
    vertical-align: top;
  }
  .basic    { box-shadow: 4px 4px 8px rgba(0,0,0,.35); }
  .no-blur  { box-shadow: 4px 4px 0 #334155; }
  .spread   { box-shadow: 0 0 0 6px #dc2626; }
  .inset    { box-shadow: inset 0 0 12px #0ea5e9; }
  .neg      { box-shadow: -4px -4px 8px rgba(0,0,0,.35); }
  .multi    { box-shadow: 2px 2px 0 #dc2626, 8px 8px 0 #f59e0b, 14px 14px 0 #16a34a; }
  .text-basic  { text-shadow: 2px 2px 4px rgba(0,0,0,.5); font-size: 32px; }
  .text-multi  { text-shadow: 0 0 4px #f59e0b, 0 0 10px #dc2626, 0 0 20px #7c2d12; color: white; background: #0f172a; font-size: 32px; padding: 14px; }
  .emboss      { color: #64748b; text-shadow: 1px 1px 0 white, -1px -1px 0 #0f172a; font-size: 28px; background: #94a3b8; padding: 14px; }
</style>
</head>
<body>
<h1>box-shadow &amp; text-shadow</h1>

<h2>box-shadow</h2>
<div class="s basic">basic blur</div>
<div class="s no-blur">solid offset</div>
<div class="s spread">spread-only ring</div>
<div class="s inset">inset</div>
<div class="s neg">negative offset</div>
<div class="s multi">multi layered</div>

<h2>text-shadow</h2>
<p class="text-basic">drop-shadowed heading</p>
<p class="text-multi">neon glow</p>
<p class="emboss">embossed text</p>
</body>
</html>
