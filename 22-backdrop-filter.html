<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>22 — backdrop-filter</title>
<style>
  body {
    font-family: sans-serif;
    margin: 0;
    background: url("assets/img-wide.png") center/cover no-repeat #0f172a;
    min-height: 100vh;
    padding: 2em;
  }
  h1 { color: white; text-shadow: 0 1px 4px rgba(0,0,0,.6); }
  .glass {
    display: inline-block;
    width: 240px;
    padding: 18px;
    margin: 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,.35);
    vertical-align: top;
  }
  .blur    { backdrop-filter: blur(10px); }
  .saturate{ backdrop-filter: saturate(2); }
  .invert  { backdrop-filter: invert(1); color: black; background: rgba(255,255,255,.1); }
  .chained { backdrop-filter: blur(6px) brightness(0.8) saturate(1.3); }
  .none    { /* no backdrop-filter */ }
</style>
</head>
<body>
<h1>backdrop-filter — over a page-wide image background</h1>
<div class="glass none">no backdrop-filter</div>
<div class="glass blur">blur(10px)</div>
<div class="glass saturate">saturate(2)</div>
<div class="glass invert">invert(1)</div>
<div class="glass chained">blur+brightness+saturate</div>
</body>
</html>
