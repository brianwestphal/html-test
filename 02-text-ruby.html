<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>02 — Ruby annotations</title>
<style>
  body { font-family: sans-serif; margin: 2em; font-size: 28px; line-height: 2.4; }
  rt { color: #6366f1; }
</style>
</head>
<body>
<h1 style="font-size:20px">Ruby annotations</h1>
<p>Japanese (furigana):
  <ruby>漢<rt>かん</rt>字<rt>じ</rt></ruby>
</p>
<p>Chinese (zhuyin / pinyin):
  <ruby>北<rt>běi</rt>京<rt>jīng</rt></ruby>
</p>
<p>With rp fallback parentheses for non-supporting renderers:
  <ruby>東<rp>(</rp><rt>とう</rt><rp>)</rp>京<rp>(</rp><rt>きょう</rt><rp>)</rp></ruby>
</p>
<p>Spans grouping base text with a single annotation:
  <ruby><rb>明日</rb><rt>あした</rt></ruby>
</p>
</body>
</html>
