<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>17 — conic-gradient</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .g { display: inline-block; width: 180px; height: 180px; margin: 10px; border-radius: 50%; vertical-align: top; }
  .wheel { background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); }
  .pie   { background: conic-gradient(#dc2626 0 25%, #f59e0b 25% 45%, #10b981 45% 80%, #4f46e5 80% 100%); }
  .from  { background: conic-gradient(from 90deg, #0ea5e9, #a855f7, #0ea5e9); }
  .at    { background: conic-gradient(from 0deg at 30% 40%, #fde68a, #dc2626); }
  .soft  { background: conic-gradient(#fecaca, #f87171, #ef4444, #b91c1c, #7f1d1d, #fecaca); }
</style>
</head>
<body>
<h1>conic-gradient</h1>
<div class="g wheel"></div>
<div class="g pie"></div>
<div class="g from"></div>
<div class="g at"></div>
<div class="g soft"></div>
</body>
</html>
