<body>
<h1>Subscript &amp; superscript</h1>
<p>Water is H<sub>2</sub>O. Sulfuric acid is H<sub>2</sub>SO<sub>4</sub>.</p>
<p>Einstein: E = mc<sup>2</sup>.</p>
<p>Binomial: (a + b)<sup>2</sup> = a<sup>2</sup> + 2ab + b<sup>2</sup>.</p>
<p>Nested: x<sup>2<sup>3</sup></sup> (two-deep superscript)
and n<sub>i<sub>j</sub></sub> (two-deep subscript).</p>
<p>Footnote marker<sup>[1]</sup> and ordinal 1<sup>st</sup> / 2<sup>nd</sup>.</p>
</body>
