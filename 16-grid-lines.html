<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>16 — grid-column / grid-row lines</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .g {
    display: grid;
    grid-template-columns: [start sidebar-start] 120px [sidebar-end main-start] 1fr [main-end] 120px [end];
    grid-template-rows: repeat(4, 60px);
    gap: 4px;
    background: #e2e8f0;
    padding: 4px;
  }
  .g > div { background: #4f46e5; color: white; padding: 6px 8px; }

  .a { grid-column: 1 / 3; grid-row: 1; background: #dc2626; }
  .b { grid-column: 3 / 4; grid-row: 1 / 3; background: #ea580c; }
  .c { grid-column: span 2; grid-row: 2; background: #16a34a; }
  .d { grid-column: main-start / main-end; grid-row: 3; background: #0ea5e9; }
  .e { grid-column: 1 / -1; grid-row: 4; background: #334155; } /* full width via negative line */
</style>
</head>
<body>
<h1>grid-column / grid-row — line numbers, names, span, negatives</h1>
<div class="g">
  <div class="a">a: cols 1/3, row 1</div>
  <div class="b">b: col 3/4, rows 1/3</div>
  <div class="c">c: span 2, row 2</div>
  <div class="d">d: main-start / main-end, row 3</div>
  <div class="e">e: 1 / -1 full width, row 4</div>
</div>
</body>
</html>
