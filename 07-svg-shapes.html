<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>07 — Inline SVG shapes</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  svg { border: 1px solid #334155; background: #f8fafc; }
</style>
</head>
<body>
<h1>Inline SVG — primitive shapes</h1>

<svg width="600" height="260" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="10" width="120" height="80" fill="#e11d48" stroke="#7f1d1d" stroke-width="3"/>
  <rect x="140" y="10" width="120" height="80" rx="16" ry="16" fill="#f59e0b"/>
  <circle cx="320" cy="50" r="40" fill="#0ea5e9" stroke="#0c4a6e" stroke-width="3"/>
  <ellipse cx="440" cy="50" rx="60" ry="30" fill="#10b981"/>
  <line x1="520" y1="10" x2="590" y2="90" stroke="#111827" stroke-width="4" stroke-linecap="round"/>

  <polyline points="10,130 60,100 110,150 160,110 210,160"
            fill="none" stroke="#4f46e5" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="260,150 290,100 350,110 340,170 280,180"
           fill="#a21caf" stroke="#4a044e" stroke-width="2"/>

  <path d="M 380 150 Q 430 80 480 150 T 580 150"
        fill="none" stroke="#059669" stroke-width="3"/>
  <path d="M 380 190 L 440 190 L 440 230 L 380 230 Z
           M 460 190 L 520 190 L 520 230 L 460 230 Z"
        fill="#f43f5e" fill-rule="evenodd"/>
  <path d="M 540 200 a 30 20 0 1 0 40 20" fill="none" stroke="#1e293b" stroke-width="2"/>
</svg>

<h2>stroke-dasharray / stroke-linecap</h2>
<svg width="600" height="80" xmlns="http://www.w3.org/2000/svg">
  <line x1="10" y1="20" x2="590" y2="20" stroke="#334155" stroke-width="4" stroke-dasharray="10 4"/>
  <line x1="10" y1="40" x2="590" y2="40" stroke="#334155" stroke-width="4" stroke-dasharray="2 2 8 2" stroke-linecap="round"/>
  <line x1="10" y1="60" x2="590" y2="60" stroke="#334155" stroke-width="6" stroke-linecap="square"/>
</svg>
</body>
</html>
