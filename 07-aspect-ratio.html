<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>07 — aspect-ratio property</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 18px; }
  .box {
    background: #dbeafe;
    border: 2px solid #1e40af;
    padding: 6px;
    text-align: center;
    color: #1e40af;
    font-weight: 600;
  }
  .b1 { width: 200px; aspect-ratio: 1 / 1; }
  .b2 { width: 200px; aspect-ratio: 16 / 9; }
  .b3 { width: 200px; aspect-ratio: 2 / 1; }
  .b4 { width: 200px; aspect-ratio: 3 / 4; }
  .b5 { height: 160px; aspect-ratio: 1 / 1; }
  img.sized {
    width: 200px;
    aspect-ratio: 4 / 1;
    background: #fef3c7;
    border: 2px solid #ca8a04;
    object-fit: contain;
  }
</style>
</head>
<body>
<h1>aspect-ratio — boxes sized by ratio</h1>

<div class="row">
  <div class="box b1">1 / 1<br>width 200</div>
  <div class="box b2">16 / 9<br>width 200</div>
  <div class="box b3">2 / 1<br>width 200</div>
  <div class="box b4">3 / 4<br>width 200</div>
  <div class="box b5">1 / 1<br>height 160</div>
</div>

<h2>aspect-ratio on replaced elements (img)</h2>
<img class="sized" src="assets/img-red.png" alt="forced 4:1">
</body>
</html>
