<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>25 — scroll-snap</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .hscroll {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-padding: 20px;
    gap: 10px;
    border: 2px solid #334155;
    padding: 10px;
    background: #f8fafc;
  }
  .hscroll > div {
    flex: 0 0 220px;
    height: 140px;
    background: #4f46e5;
    color: white;
    padding: 12px;
    font-weight: 600;
    scroll-snap-align: start;
  }
  .hscroll > div.center { scroll-snap-align: center; background: #dc2626; }
  .hscroll > div.end    { scroll-snap-align: end; background: #16a34a; }

  .vscroll {
    height: 200px;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    border: 2px solid #334155;
    background: #f8fafc;
    margin-top: 14px;
  }
  .vscroll > div {
    height: 160px;
    background: #ea580c;
    color: white;
    padding: 12px;
    scroll-snap-align: start;
    border-bottom: 2px solid white;
    font-weight: 600;
  }
</style>
</head>
<body>
<h1>scroll-snap</h1>
<p>Drag-scroll the boxes — they snap to each panel's start/center/end as
declared.</p>

<h2>Horizontal, x mandatory</h2>
<div class="hscroll">
  <div>1 (start)</div>
  <div class="center">2 (center)</div>
  <div class="end">3 (end)</div>
  <div>4 (start)</div>
  <div class="center">5 (center)</div>
  <div>6 (start)</div>
  <div>7 (start)</div>
</div>

<h2>Vertical, y mandatory</h2>
<div class="vscroll">
  <div>Slide 1</div>
  <div>Slide 2</div>
  <div>Slide 3</div>
  <div>Slide 4</div>
  <div>Slide 5</div>
</div>
</body>
</html>
