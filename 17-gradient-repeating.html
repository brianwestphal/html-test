<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>17 — repeating gradients</title>
<style>
  body { font-family: sans-serif; margin: 2em; }
  .g { display: inline-block; width: 260px; height: 140px; margin: 6px; color: white; padding: 8px; font-weight: bold; vertical-align: top; }
  .stripes-45 {
    background: repeating-linear-gradient(45deg, #0f172a 0 10px, #f59e0b 10px 20px);
  }
  .stripes-90 {
    background: repeating-linear-gradient(90deg, #dc2626 0 20px, #fecaca 20px 40px);
  }
  .bars {
    background: repeating-linear-gradient(to bottom, #4f46e5 0 8px, transparent 8px 20px), #fde68a;
  }
  .rings {
    background: repeating-radial-gradient(circle at center, #0ea5e9 0 10px, #bae6fd 10px 20px);
  }
  .checker {
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,0) 0 20px, rgba(0,0,0,0.2) 20px 40px),
      repeating-linear-gradient(0deg,  rgba(0,0,0,0) 0 20px, rgba(0,0,0,0.2) 20px 40px),
      #fef3c7;
    color: #334155;
  }
</style>
</head>
<body>
<h1>Repeating gradients</h1>
<div class="g stripes-45">45° stripes</div>
<div class="g stripes-90">90° stripes</div>
<div class="g bars">vertical bars</div>
<div class="g rings">rings (repeating-radial)</div>
<div class="g checker">checkerboard grid (two stripe layers)</div>
</body>
</html>
